version: "3.9"

services:
  auth_service:
    build: ./auth_service
    container_name: auth_service
    working_dir: /app
    env_file:
      - ./auth_service/.env
    ports:
      - "8000:8000"
    volumes:
      - ./auth_service:/app

  bot_service:
    build: ./bot_service
    container_name: bot_service
    working_dir: /app
    env_file:
      - ./bot_service/.env
    ports:
      - "8001:8001"
    volumes:
      - ./bot_service:/app
    depends_on:
      - rabbitmq
      - redis

  bot_runner:
    build: ./bot_service
    container_name: bot_runner
    working_dir: /app
    command: python run_bot.py
    env_file:
      - ./bot_service/.env
    volumes:
      - ./bot_service:/app
    depends_on:
      - rabbitmq
      - redis

  celery_worker:
    build: ./bot_service
    container_name: celery_worker
    working_dir: /app
    command: celery -A app.infra.celery_app.celery_app worker --loglevel=info
    env_file:
      - ./bot_service/.env
    volumes:
      - ./bot_service:/app
    depends_on:
      - rabbitmq
      - redis

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"